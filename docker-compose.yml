services:

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - 8000:8000
    depends_on:
    - whisper-asr
  whisper-asr:
    env_file:
      - ./.env
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-asr
    expose:
      - 9000
    volumes:
      - ./models:/models             
