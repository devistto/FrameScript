services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - 8000:8000
    depends_on:
      - whisper-asr
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  whisper-asr:
    environment:
      - ASR_ENGINE=faster_whisper
      - ASR_MODEL=large-v3
      - ASR_DEVICE=cpu
      - ASR_MODEL_PATH=/models
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-asr
    ports:
      - 9000:9000
    expose:
      - 9000
    volumes:
      - ./models:/models

  redis:
    image: redis:8
    container_name: redis
    expose:
      - 6379
